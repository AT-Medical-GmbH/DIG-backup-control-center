name: Validate bootstrap scaffold

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 major ref resolved 2026-07-10
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 major ref resolved 2026-07-10
        with:
          python-version: '3.12'

      - name: Install dashboard templating dependency
        run: python -m pip install --disable-pip-version-check jinja2

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(find scripts packaging -type f -print0)

      - name: Validate Python entrypoint
        run: python -m py_compile app/main.py

      - name: Run repository audit
        run: scripts/atmed-bcc-audit --config-dir examples
