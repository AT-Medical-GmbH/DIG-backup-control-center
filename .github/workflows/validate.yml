name: Validate bootstrap scaffold

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dashboard templating dependency
        run: python -m pip install --disable-pip-version-check jinja2
      - name: Validate shell scripts
        run: |
          bash -n scripts/*
          bash -n packaging/*
      - name: Validate Python entrypoint
        run: python -m py_compile app/main.py
      - name: Run repository audit
        run: scripts/atmed-bcc-audit --config-dir examples
